{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-3">Set a new password</h2>
            {% if validlink %}
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100" type="submit">Update password</button>
                </form>
            {% else %}
                <p>This reset link is invalid or expired.</p>
                <a class="btn btn-outline-primary" href="{% url 'password_reset' %}">Request a new link</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
